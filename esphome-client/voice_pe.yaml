    key: "C14DR0lU9Ze3QMCUMxfiWurno9BXnNG+3zWwjleSepw="

ota:
 - platform: esphome
   password: "16230620a0262c98d2185fe92cc9a61f"

# ─── Global to hold Gemini client pointer ─────────────────────────────────────
globals:
  - id: gemini_client_ptr
    type: void*
    restore_value: false
    initial_value: "nullptr"

# ─── Wake Word → Start Gemini Session ─────────────────────────────────────────
# Override the on_wake_word_detected event from the official YAML to also
# trigger our Gemini session. The official voice_assistant.start is REPLACED
# since we don't use HA voice assistant pipeline.
micro_wake_word:
  on_wake_word_detected:
    - lambda: |-
        if (id(gemini_client_ptr) != nullptr) {
            auto *client = static_cast<GeminiWebSocketClient*>(id(gemini_client_ptr));
            client->startSession();
        }