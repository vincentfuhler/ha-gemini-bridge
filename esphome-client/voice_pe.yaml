substitutions:
  name: "gemini-voice-pe"
  friendly_name: "Gemini Voice PE"
  websocket_url: "ws://10.3.0.41:8000/ws?in_depth=32&in_channels=2&in_rate=16000&out_depth=32&out_rate=48000&out_channels=2"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  includes:
    - gemini_websocket.h

# Offizielle Hardware-Konfiguration von Nabu Casa für das Voice PE laden
packages:
  voice_pe_hardware:
    url: https://github.com/esphome/home-assistant-voice-pe
    file: home-assistant-voice.yaml
    refresh: 0d

# WLAN Konfiguration
wifi:
  ssid: "Paul Walter"
  password: "paulwalter"
  on_connect:
    - lambda: |-
        // Wird erst sicher ausgeführt, sobald das WLAN steht!
        auto gemini_client = new GeminiWebSocketClient("${websocket_url}", id(i2s_mics), id(media_mixing_input));
        gemini_client->setup();

# Standard APIs
api:
  encryption:
    key: "C14DR0lU9Ze3QMCUMxfiWurno9BXnNG+3zWwjleSepw="

ota:
