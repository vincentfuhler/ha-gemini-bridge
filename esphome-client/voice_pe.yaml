substitutions:
  name: "gemini-voice-pe"
  friendly_name: "Gemini Voice PE"
  websocket_url: "ws://10.3.0.41:8000/ws?in_depth=32&in_channels=2&in_rate=16000&out_depth=16&out_rate=48000&out_channels=2"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  includes:
    - gemini_websocket.h

# ─── Official Voice PE Hardware Configuration ─────────────────────────────────
packages:
  voice_pe_hardware:
    url: https://github.com/esphome/home-assistant-voice-pe
    file: home-assistant-voice.yaml
    refresh: 0d

# ─── Network ──────────────────────────────────────────────────────────────────
wifi:
  ssid: "Paul Walter"
  password: "paulwalter"
  on_connect:
    - lambda: |-
        if (id(gemini_client_ptr) == nullptr) {
            // Create the Gemini client ONCE on first WiFi connect.
            // NOTE: mic is NOT started here — microWakeWord manages the mic!
            // We only register our callback and connect the WebSocket.
            auto *client = new GeminiWebSocketClient("${websocket_url}", id(i2s_mics), id(media_mixing_input));

            client->on_session_ended_ = []() {
                ESP_LOGI("gemini_ws", "✅ Gemini session ended. Back to wake-word listening.");
            };

            App.register_component_(client);
            client->setup();
            id(gemini_client_ptr) = (void*)client;
            ESP_LOGI("gemini_ws", "Gemini client created. Waiting for wake word 'Okay Nabu'...");
        }
    # Explicitly start microWakeWord so it listens for "Okay Nabu"
    # The official VA state machine is not used, so we must start it ourselves.
    - delay: 500ms
    - micro_wake_word.start:
        id: mww

# ─── API / OTA ────────────────────────────────────────────────────────────────
api:
  encryption:
    key: "C14DR0lU9Ze3QMCUMxfiWurno9BXnNG+3zWwjleSepw="

ota:
 - platform: esphome
   password: "16230620a0262c98d2185fe92cc9a61f"

# ─── Global to hold Gemini client pointer ─────────────────────────────────────
globals:
  - id: gemini_client_ptr
    type: void*
    restore_value: false
    initial_value: "nullptr"

# ─── Wake Word → Start Gemini Session ─────────────────────────────────────────
# Merges with the official YAML's on_wake_word_detected.
# The official handler tries to start voice_assistant (which will fail gracefully).
# Our handler starts the Gemini session.
micro_wake_word:
  on_wake_word_detected:
    - lambda: |-
        ESP_LOGI("gemini_ws", "🎙️ Wake word detected! Starting Gemini session...");
        if (id(gemini_client_ptr) != nullptr) {
            auto *client = static_cast<GeminiWebSocketClient*>(id(gemini_client_ptr));
            client->startSession();
        }