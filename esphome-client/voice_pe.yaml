substitutions:
  name: "gemini-voice-pe"
  friendly_name: "Gemini Voice PE"
  websocket_url: "ws://10.3.0.41:8000/ws?in_depth=32&in_channels=2&in_rate=16000&out_depth=16&out_rate=48000&out_channels=2"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  includes:
    - gemini_websocket.h
  on_boot:
    priority: -100  # Run after all components are initialized
    then:
      - lambda: |-
          // Create the Gemini client ONCE at boot (WebSocket stays persistently connected).
          // This avoids expensive reconnection latency on every wake word detection.
          auto *client = new GeminiWebSocketClient("${websocket_url}", id(i2s_mics), id(media_mixing_input));
          
          // When the session auto-expires (20s after last Gemini audio), log it.
          client->on_session_ended_ = []() {
              ESP_LOGI("gemini_ws", "✅ Session ended. Device is back in idle/wake-word mode.");
          };
          
          App.register_component_(client);
          client->setup();
          
          // Store pointer to global for wake word callback access
          id(gemini_client_ptr) = (void*)client;

# ─── Official Voice PE Hardware Configuration ─────────────────────────────────
packages:
  voice_pe_hardware:
    url: https://github.com/esphome/home-assistant-voice-pe
    file: home-assistant-voice.yaml
    refresh: 0d

