substitutions:
  name: "gemini-voice-pe"
  friendly_name: "Gemini Voice PE"
  websocket_url: "ws://10.3.0.41:8000/ws" 

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  includes:
    - gemini_websocket.h

# Offizielle Hardware-Konfiguration von Nabu Casa für das Voice PE laden
packages:
  voice_pe_hardware:
    url: https://github.com/esphome/home-assistant-voice-pe
    file: home-assistant-voice.yaml
    refresh: 0d

# WLAN Konfiguration
wifi:
  ssid: "HEPTACOM UID_IoT"
  password: "(3DrFrQK"
  on_connect:
    - then:
        - lambda: |-
            // Wird erst sicher ausgeführt, sobald das WLAN steht!
            auto gemini_client = new GeminiWebSocketClient("${websocket_url}", id(i2s_mics), id(i2s_audio_speaker));
            gemini_client->setup();

# Standard APIs
api:
ota:
