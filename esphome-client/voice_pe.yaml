substitutions:
  name: "gemini-voice-pe"
  friendly_name: "Gemini Voice PE"
  websocket_url: "ws://10.3.0.41:8000/ws?in_depth=32&in_channels=2&in_rate=16000&out_depth=16&out_rate=48000&out_channels=2"

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  includes:
    - gemini_websocket.h
  on_boot:
    # Priority -500: runs very late, after all components are setup.
    # WiFi may still be connecting, but the WebSocket task retries automatically.
    priority: -500
    then:
      - lambda: |-
          if (id(gemini_client_ptr) == nullptr) {
              ESP_LOGI("gemini_ws", "🚀 on_boot: Creating Gemini client...");
              auto *client = new GeminiWebSocketClient("${websocket_url}", id(i2s_mics), id(media_mixing_input));
              client->on_session_ended_ = []() {
                  ESP_LOGI("gemini_ws", "✅ Session ended. Say 'Okay Nabu' or press button to start.");
              };
              App.register_component_(client);
              client->setup();
              id(gemini_client_ptr) = (void*)client;
              ESP_LOGI("gemini_ws", "✅ Gemini client created. Waiting for WiFi + wake trigger.");
          }
      # Give WiFi 3 seconds to connect, then start microWakeWord via official script
      - delay: 3s
      - script.execute: va_idle

# ─── Official Voice PE Hardware Configuration ─────────────────────────────────
packages:
  voice_pe_hardware:
    url: https://github.com/esphome/home-assistant-voice-pe
    file: home-assistant-voice.yaml
    refresh: 0d

# ─── Network ──────────────────────────────────────────────────────────────────
wifi:
  ssid: "Paul Walter"
  password: "paulwalter"

# ─── API / OTA ────────────────────────────────────────────────────────────────
api:
  encryption:
    key: "C14DR0lU9Ze3QMCUMxfiWurno9BXnNG+3zWwjleSepw="

ota:
 - platform: esphome
   password: "16230620a0262c98d2185fe92cc9a61f"

# ─── Global to hold Gemini client pointer ─────────────────────────────────────
globals:
  - id: gemini_client_ptr
    type: void*
    restore_value: false
    initial_value: "nullptr"

# ─── Button: Long press (2s) → Start/Stop Gemini Session ──────────────────────
# Short press (< 200ms) is handled by the official YAML (volume/mute etc.)
# Long press is our exclusive Gemini trigger — works even if wake word fails.
binary_sensor:
  - id: action_button
    on_click:
      min_length: 1500ms
      max_length: 5000ms
      then:
        - lambda: |-
            if (id(gemini_client_ptr) != nullptr) {
                auto *client = static_cast<GeminiWebSocketClient*>(id(gemini_client_ptr));
                if (client->isSessionActive()) {
                    ESP_LOGI("gemini_ws", "🛑 Button: Stopping session.");
                    client->stopSession();
                } else {
                    ESP_LOGI("gemini_ws", "🎙️ Button: Starting Gemini session.");
                    client->startSession();
                }
            }

# ─── Wake Word → Start Gemini Session ─────────────────────────────────────────
# Merges with the official YAML's on_wake_word_detected.
micro_wake_word:
  on_wake_word_detected:
    - lambda: |-
        ESP_LOGI("gemini_ws", "🎙️ Wake word detected! Starting Gemini session...");
        if (id(gemini_client_ptr) != nullptr) {
            auto *client = static_cast<GeminiWebSocketClient*>(id(gemini_client_ptr));
            client->startSession();
        }