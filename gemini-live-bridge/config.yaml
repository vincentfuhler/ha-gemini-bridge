name: "Gemini Live Bridge"
description: "A high-performance bridge service connecting Home Assistant Voice to the Gemini Live API."
version: "1.4.6"
slug: "gemini_bridge"
init: false
map:
  - config:rw
hassio_api: true
homeassistant_api: true
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
options:
  GEMINI_API_KEY: ""
  GEMINI_MODEL: "models/gemini-2.5-flash-live-preview"
  GEMINI_VOICE: "Puck"
  HA_URL: "http://supervisor/core"
  HA_TOKEN: ""
  WAKE_WORD: "computer"
  CUSTOM_WAKE_WORD_DIR: "/config/wakewords"
  LOG_LEVEL: "INFO"
  OPTIMIZER_MODEL: "models/gemini-2.5-flash"
  OPTIMIZER_PROMPT: "Betrachte die Geräte die in Homeassiten zur verfügung stehen und erstelle hierraus eine JSON für eine Heimautomatierungs AI. Lichter sollen in Gruppen und nicht einzeln gesteuert werden. Betrachte die Geräte und versuch die JSON so sinnvoll wie möglich für den Assistenten zu bauen. Der Assistent benötigt einen Namen, ggf eine Kurzbeschreibung und die Home Assistant ID für die Steuerung sowie mögliche Steuerbefehle."
schema:
  GEMINI_API_KEY: "password"
  GEMINI_MODEL: "str"
  GEMINI_VOICE: "str"
  HA_URL: "str"
  HA_TOKEN: "password"
  WAKE_WORD: "str"
  CUSTOM_WAKE_WORD_DIR: "str"
  LOG_LEVEL: "match(^DEBUG|INFO|WARNING|ERROR|CRITICAL$)"
  OPTIMIZER_MODEL: "str"
  OPTIMIZER_PROMPT: "str"
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "Websocket Bridge API"
