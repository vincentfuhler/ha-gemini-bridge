version: '3.8'

services:
  ha-gemini-bridge:
    build: ./gemini-live-bridge
    container_name: ha-gemini-bridge
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./gemini-live-bridge/src:/app/src
